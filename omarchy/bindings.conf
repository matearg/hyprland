# Application bindings
bindd = SUPER, RETURN, Terminal, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)"
bindd = SUPER ALT, RETURN, Tmux, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)" tmux new
bindd = SUPER SHIFT, RETURN, Browser, exec, omarchy-launch-browser
bindd = SUPER SHIFT, F, File manager, exec, uwsm-app -- nautilus --new-window
bindd = SUPER ALT SHIFT, F, File manager (cwd), exec, uwsm-app -- nautilus --new-window "$(omarchy-cmd-terminal-cwd)"
bindd = SUPER SHIFT, B, Browser, exec, omarchy-launch-browser
bindd = SUPER SHIFT ALT, B, Browser (private), exec, omarchy-launch-browser --private
bindd = SUPER SHIFT, N, Editor, exec, omarchy-launch-editor

# Add extra bindings
# bindd = SUPER SHIFT, A, ChatGPT, exec, omarchy-launch-webapp "https://chatgpt.com"
# bindd = SUPER SHIFT, R, exec, alacritty -e ssh your-server

# Overwrite existing bindings, like putting Omarchy Menu on Super + Space
# unbind = SUPER, SPACE
# bindd = SUPER, SPACE, Omarchy menu, exec, omarchy-menu
unbind = SUPER, H
unbind = SUPER, J
unbind = SUPER, K
unbind = SUPER, L
bindd = SUPER, H, Move focus left, movefocus, l
bindd = SUPER, J, Move focus left, movefocus, d
bindd = SUPER, K, Move focus left, movefocus, u
bindd = SUPER, L, Move focus left, movefocus, r

unbind = SUPER SHIFT, H
unbind = SUPER SHIFT, J
unbind = SUPER SHIFT, K
unbind = SUPER SHIFT, L
bindd = SUPER SHIFT, H, Swap window to the left, swapwindow, l
bindd = SUPER SHIFT, J, Swap window down, swapwindow, d
bindd = SUPER SHIFT, K, Swap window up, swapwindow, u
bindd = SUPER SHIFT, L, Swap window to the right, swapwindow, r

unbind = SUPER, F
bindd = SUPER, F, Full width, fullscreen, 1

unbind = SUPER, X
bindd = SUPER, X, Power menu, exec, omarchy-menu system

unbind = SUPER, B
bindd = SUPER, B, Browser, exec, omarchy-launch-browser
unbind = SUPER SHIFT, B
bindd = SUPER SHIFT, B, Browser (private), exec, omarchy-launch-browser --private

# Resize active window
unbind = SUPER, equal
unbind = SUPER SHIFT, equal
bindd = SUPER, plus, Shrink window left, resizeactive, 100 0
bindd = SUPER SHIFT, plus, Expand window down, resizeactive, 0 100
